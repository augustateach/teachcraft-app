<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Precision Reboot: Vocabulary & Transformations</title>
<style>
:root{--cream:#f8f7f2;--navy:#1b2a47;--blue:#85a1c1;--gold:#cfa144;--ok:#2f7d5b;--bad:#a33a3a;--card:#fff;--line:#d9d7cf}
*{box-sizing:border-box} html,body{margin:0;height:100%;font-family:Inter,system-ui,-apple-system,Segoe UI,sans-serif;background:var(--cream);color:var(--navy)}
body{display:flex;flex-direction:column;min-height:100dvh}
header{padding:14px 18px;border-bottom:1px solid var(--line);background:rgba(248,247,242,.96);position:sticky;top:0;z-index:10}
.header-row{display:flex;gap:12px;align-items:center;justify-content:space-between;max-width:980px;margin:auto}
h1{font-size:clamp(1.05rem,2.8vw,1.35rem);margin:0}.meta{font-size:.9rem;white-space:nowrap}
.progress{height:7px;background:#e5e2d8;border-radius:99px;overflow:hidden;margin:10px auto 0;max-width:980px}.progress>div{height:100%;background:var(--gold);width:0}
main{flex:1;overflow:auto;padding:20px 16px 190px}.screen{max-width:900px;margin:auto}.eyebrow{font-size:.82rem;text-transform:uppercase;letter-spacing:.08em;color:#5c6f8c;font-weight:800}
h2{font-size:clamp(1.5rem,4vw,2.2rem);margin:.4rem 0 1rem}.lead{font-size:1.05rem;line-height:1.55}
.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:18px;margin:14px 0;box-shadow:0 5px 18px rgba(27,42,71,.06)}
.options{display:grid;gap:12px}.option,.chip,.target,button,select,input,textarea{font:inherit}
.option,.chip{min-height:52px;border:2px solid #c9d2dd;border-radius:14px;background:#fff;padding:12px 14px;color:var(--navy);text-align:left;cursor:pointer}
.option.selected,.chip.selected{border-color:var(--navy);background:#eef3f8}.option.correct,.chip.correct{border-color:var(--ok);background:#edf8f2}.option.wrong,.chip.wrong{border-color:var(--bad);background:#fff0f0}
.grid{display:grid;gap:12px}.grid.two{grid-template-columns:repeat(auto-fit,minmax(220px,1fr))}
label{font-weight:700;display:block;margin:10px 0 6px}input[type=text],textarea,select{width:100%;min-height:52px;border:2px solid #c9d2dd;border-radius:12px;padding:12px;background:#fff;color:var(--navy)}input.correct,select.correct,textarea.correct{border-color:var(--ok);background:#edf8f2}input.wrong,select.wrong,textarea.wrong{border-color:var(--bad);background:#fff0f0}
textarea{min-height:180px;resize:vertical}.feedback{display:none;margin-top:14px;border-left:5px solid var(--blue);background:#eef3f8;padding:14px;border-radius:10px;line-height:1.5}.feedback.show{display:block}.feedback.ok{border-color:var(--ok);background:#edf8f2}.feedback.bad{border-color:var(--bad);background:#fff0f0}
.small{font-size:.9rem;color:#56657b}.wordcount{font-weight:800}
.bottom{position:fixed;left:0;right:0;bottom:0;z-index:20;background:rgba(248,247,242,.98);border-top:1px solid var(--line);padding:10px 14px calc(10px + env(safe-area-inset-bottom))}
.bottom-inner{max-width:900px;margin:auto}.check-row{display:flex;justify-content:center;margin-bottom:9px}
button{min-height:48px;border:0;border-radius:12px;padding:11px 18px;font-weight:800;cursor:pointer}
.primary{background:var(--navy);color:#fff}.secondary{background:#dfe7ef;color:var(--navy)}button:disabled{opacity:.45;cursor:not-allowed}.nav{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px}.nav button:last-child{justify-self:end}.counter{font-weight:800}
.pills{display:flex;gap:8px;flex-wrap:wrap}.pill{background:#e8edf3;border-radius:99px;padding:7px 10px;font-size:.88rem}
.resultbar{height:12px;background:#e6e2d9;border-radius:99px;overflow:hidden}.resultbar span{display:block;height:100%;background:var(--gold)}
.checklist label{display:flex;gap:10px;align-items:flex-start;font-weight:600}.checklist input{width:22px;height:22px}.answer-key{margin:.55rem 0 0;padding-left:1.25rem}.answer-key li{margin:.35rem 0}.answer-key strong{color:var(--navy)}
@media(max-width:600px){main{padding-inline:12px}.card{padding:15px}.meta{font-size:.78rem}}
</style>
</head>
<body>
<header><div class="header-row"><h1>Precision Reboot</h1><div class="meta"><span id="score">0</span>/35 • <span id="sectionName"></span></div></div><div class="progress"><div id="prog"></div></div></header>
<main><section id="app" class="screen"></section></main>
<div class="bottom"><div class="bottom-inner"><div class="check-row"><button id="checkBtn" class="primary" type="button">Check</button></div><div class="nav"><button id="prevBtn" class="secondary" type="button">Previous</button><div class="counter"><span id="num">1</span>/31</div><button id="nextBtn" class="secondary" type="button">Next</button></div></div></div>
<script>
const S=[
{t:"Precision Starts Here",sec:"Word Formation & Verb Precision",type:"mc",q:"Which sentence is the most precise for a formal museum report?",o:["The new layout improved accessibility.","The new layout enhanced accessibility.","The new layout honed accessibility."],a:1,f:"Enhanced is the most precise formal choice. It means the layout increased the quality or effectiveness of accessibility. Hone is used with skills and techniques."},
{t:"Build the Word Families",sec:"Word Formation & Verb Precision",type:"sort",q:"Sort each word into its category.",items:["innovative","outstanding","civilisations","significant","undergone","enables","accessible","congratulations"],cats:["Adjective","Noun","Verb or verb form"],ans:["Adjective","Adjective","Noun","Adjective","Verb or verb form","Verb or verb form","Adjective","Noun"],f:"Adjectives: innovative, outstanding, significant, accessible. Nouns: civilisations, congratulations. Verb forms: undergone, enables."},
{t:"Modernising a Museum: First Four Gaps",sec:"Word Formation & Verb Precision",type:"textmulti",q:"Change the words in capitals.",prompts:["one of the world’s most important and ___ cultural showcases (INNOVATE)","collections are absolutely ___ (STAND)","cultures of many different ___ (CIVILISE)","Every object has a ___ story (SIGNIFY)"],ans:["innovative","outstanding","civilisations","significant"],f:"Outstanding means exceptionally good. Significant means important or meaningful here—not simply large."},
{t:"Modernising a Museum: Final Four Locks",sec:"Word Formation & Verb Precision",type:"textmulti",q:"Unlock the final part.",prompts:["has ___ an amazing makeover (GO)","layout ___ people to appreciate (ABLE)","is ___ to everyone (ACCESS)","___ to everyone involved (CONGRATULATE)"],ans:["undergone","enables","accessible","congratulations"],f:"We say has undergone because the makeover has already happened. Enable someone to do something takes an object and a to-infinitive."},
{t:"Access Check",sec:"Word Formation & Verb Precision",type:"selectmulti",q:"Choose accessible or inaccessible.",prompts:["A gallery has lifts, wide doors and step-free entrances.","The only entrance is at the top of a narrow staircase.","Labels are in large print and several languages."],opts:["accessible","inaccessible"],ans:["accessible","inaccessible","accessible"],f:"Accessible means easy to enter, reach, use or understand. The prefix in- changes the meaning to its opposite."},
{t:"How Significant Is “Significant”?",sec:"Word Formation & Verb Precision",type:"match",q:"Match each phrase to its meaning.",prompts:["a significant story","a significant improvement","a significant amount of money"],opts:["meaningful or important","noticeable and important","fairly large or considerable"],ans:["meaningful or important","noticeable and important","fairly large or considerable"],f:"The exact meaning changes with the noun. Significant does not always mean “very big”."},
{t:"The Three-Verb Tuning Fork",sec:"Word Formation & Verb Precision",type:"match",q:"Match each verb to its central meaning.",prompts:["improve","enhance","hone"],opts:["make something better than before","increase quality, effectiveness or value","develop and refine a skill through practice"],ans:["make something better than before","increase quality, effectiveness or value","develop and refine a skill through practice"],f:"Improve is broadest. Enhance is often more formal. Hone normally needs a skill, ability or technique."},
{t:"Collocation Magnets",sec:"Word Formation & Verb Precision",type:"sort",q:"Sort each phrase by its most natural default verb.",items:["your English","performance","health","efficiency","the learning experience","security","your reputation","productivity","your skills","your writing technique","critical thinking","problem-solving skills"],cats:["Improve","Enhance","Hone"],ans:["Improve","Improve","Improve","Improve","Enhance","Enhance","Enhance","Enhance","Hone","Hone","Hone","Hone"],f:"Some combinations are possible with more than one verb, but these are the most natural defaults."},
{t:"One Situation, One Precise Verb",sec:"Word Formation & Verb Precision",type:"textmulti",q:"Use the best verb in the correct form.",prompts:["Regular feedback helps learners ___ their presentation skills.","The new lighting ___ the appearance of the exhibits.","Visitor satisfaction has ___ since the renovation."],ans:["hone","enhances","improved"],f:"Skills are honed, qualities are often enhanced, and general results or conditions improve."},
{t:"Does It Make a Difference?",sec:"Key Word Transformations",type:"text",q:"It ___ the other students whether you present on Thursday or Friday.",ans:["makes no difference to","makes little difference to","doesn't make any difference to","does not make any difference to","doesn't make much difference to"],f:"The fixed pattern is make a difference to someone. The preposition is to, not for."},
{t:"What Did They Have in Mind?",sec:"Key Word Transformations",type:"text",q:"The tutor asked the students what ___ for the college’s centenary celebration.",ans:["they had in mind"],f:"Have something in mind means to be considering or planning it. The tense moves back in reported speech."},
{t:"The Respect Meter",sec:"Key Word Transformations",type:"mc",q:"Dr Ramesh ___ by his colleagues that they forgave his inability to remember names.",o:["was held at such high regard","was held in such high regard","held such a high regard"],a:1,f:"The fixed phrase is be held in high regard. It is passive because the colleagues respected Dr Ramesh."},
{t:"Easy Is Not Always an Adjective",sec:"Key Word Transformations",type:"mc",q:"Learning new languages had always ___ Katy.",o:["come easy to","came easily to","come easily for","came natural for"],a:1,f:"Come easily to someone means something is not difficult for them. We need an adverb: easily, not easy."},
{t:"The Misinformation Timeline",sec:"Key Word Transformations",type:"text",q:"She seems ___ train times by our call-centre staff.",ans:["to have been misinformed about","to have been misinformed on"],f:"Seems is a present conclusion. To have been misinformed refers back to an earlier passive event."},
{t:"Election Contingency",sec:"Key Word Transformations",type:"text",q:"In ___ the election, she’ll become President.",ans:["the unlikely event of her party winning"],f:"After in the event of, use a noun or an -ing form. Do not put a complete clause directly after of."},
{t:"The Language X-Ray",sec:"Key Word Transformations",type:"textmulti",q:"Each sentence contains one damaged fragment. Enter only the corrected fragment.",prompts:["It makes no difference [for] the students whether we meet today or tomorrow.","The tutor asked what [did they have] in mind.","She was held [at] such high regard by her colleagues.","Languages had always come [easy] to Katy.","She seems [to have misinformed] about the train times.","In the unlikely event [her party wins], she’ll become President."],ans:["to","they had","in","easily","to have been misinformed","of her party winning"],f:"Correct repairs: for → to; did they have → they had; at → in; easy → easily; to have misinformed → to have been misinformed; her party wins → of her party winning. Strong transformations depend on prepositions, word order, adverb forms and passive meaning."},
{t:"Definition Flash Wall",sec:"Vocabulary Recall",type:"match",q:"Match each word to its definition.",prompts:["reinforced","agility","lunatic","nickel","MDF","kiln","hardback"],opts:["made stronger by added support","quick, controlled movement","offensive word for an irrational person","hard silvery metal","compressed wood-fibre board","very hot oven for firing clay","book with a stiff cover"],ans:["made stronger by added support","quick, controlled movement","offensive word for an irrational person","hard silvery metal","compressed wood-fibre board","very hot oven for firing clay","book with a stiff cover"],f:"Use distinctive clues: kiln–heat, MDF–wood fibres, nickel–metal, agility–quick controlled movement."},
{t:"The Vocabulary Laboratory",sec:"Vocabulary Recall",type:"sort",q:"Sort the words.",items:["nickel","MDF","kiln","hardback","agility","reinforced","lunatic"],cats:["Material","Object or equipment","Ability","Description","Person word with a register warning"],ans:["Material","Material","Object or equipment","Object or equipment","Ability","Description","Person word with a register warning"],f:"Knowing word class and category makes vocabulary easier to retrieve in a new context."},
{t:"Register Alarm",sec:"Vocabulary Recall",type:"mc",q:"Which revision is the most professional and neutral?",o:["The manager dismissed the complaint as completely mental.","The manager dismissed the complaint as irrational and unsupported.","The manager dismissed the complaint as crazier than expected."],a:1,f:"Lunatic can sound insulting or offensive. In formal English, describe the behaviour or argument rather than labelling the person."},
{t:"Apostrophe Emergency",sec:"Vocabulary Recall",type:"mc",q:"Which spelling is correct?",o:["childrens ward","childrens’ ward","children’s ward","childrens’s ward"],a:2,f:"Children is already an irregular plural. Add ’s to show possession: children’s ward."},
{t:"Meaning Bridge",sec:"Vocabulary Recall",type:"match",q:"Match each phrase to its clearest paraphrase.",prompts:["acquired knowledge","a forecast","a substitute","benefits and drawbacks","future generations"],opts:["people who will live after us","learnt or became informed","advantages and disadvantages","a replacement or alternative","a prediction about what will happen"],ans:["learnt or became informed","a prediction about what will happen","a replacement or alternative","advantages and disadvantages","people who will live after us"],f:"A useful paraphrase keeps the original meaning but changes wording and structure."},
{t:"Spot On or Came True?",sec:"Vocabulary Recall",type:"match",q:"Match each sentence to its exact meaning.",prompts:["The forecast was spot on.","The forecast came true.","Paper tickets became a thing of the past.","Visitors will not be accustomed to paper maps."],opts:["prediction was completely correct","predicted event actually happened","something became outdated","people will not be used to something"],ans:["prediction was completely correct","predicted event actually happened","something became outdated","people will not be used to something"],f:"Spot on evaluates accuracy. Came true says the predicted event happened. They are related, but not identical."},
{t:"The Workforce Forecast",sec:"Vocabulary Recall",type:"textmulti",q:"Complete the report with the phrase cards.",prompts:["Experts ___ major alterations to the workforce.","Experts forecast major ___.","These developments will bring both ___.","These developments will affect ___."],ans:["forecast","alterations to the workforce","benefits and drawbacks","future generations"],f:"The complete sequence is: forecast → alterations to the workforce → benefits and drawbacks → future generations. The paragraph moves logically from prediction, to change, to consequences, to the people affected."},
{t:"Money Match",sec:"Money Language",type:"match",q:"Match the everyday meaning to the stronger expression.",prompts:["make money","lose money","owe money","spend a lot","negotiate a price","earn according to sales"],opts:["raise revenues","take a hit","be in debt","splash out","haggle","be paid on commission"],ans:["raise revenues","take a hit","be in debt","splash out","haggle","be paid on commission"],f:"Take a hit describes a loss, while splash out describes spending freely."},
{t:"The Money Dashboard",sec:"Money Language",type:"textmulti",q:"Use the best expression in the correct form.",prompts:["Ticket sales fell, so the museum ___.","The organisation owes the bank. It is ___.","The shop introduced products to ___.","We decided to ___ on a hardback.","The customer tried to ___ over the price.","The team earns more when it sells more because it is ___."],ans:["took a hit","in debt","raise revenues","splash out","haggle","paid on commission"],f:"Look for the situation: falling sales signal take a hit; performance-based pay signals commission."},
{t:"The Negotiation Chat",sec:"Money Language",type:"textmulti",q:"Complete the conversation.",prompts:["We need to ___ if we want to support the children’s ward.","We shouldn’t ___ on furniture.","We are already ___.","We can ___ with the supplier."],ans:["raise revenues","splash out","in debt","haggle"],f:"The sequence is realistic: earn more, avoid unnecessary spending, recognise debt and negotiate."},
{t:"What Job Does the Phrase Do?",sec:"Image Description",type:"match",q:"Match each phrase to its function.",prompts:["At first glance, …","From all appearances, …","This picture appears to depict …","It looks as though …","…, which suggests that people are likely to …"],opts:["opening impression","conclusion from visible evidence","cautious description","cautious interpretation","prediction or broader inference"],ans:["opening impression","conclusion from visible evidence","cautious description","cautious interpretation","prediction or broader inference"],f:"Strong image descriptions move from what is visible to what may be true. They do not present guesses as facts."},
{t:"Build the Camera Commentary",sec:"Image Description",type:"text",q:"Write the two-sentence model description of a busy museum gallery.",ans:["at first glance, this picture appears to depict a busy museum gallery. several visitors are reading the display labels, which suggests that they are interested in the exhibition."],f:"The first sentence describes cautiously. The second links visible evidence to a reasonable interpretation."},
{t:"The Overclaim Detector",sec:"Image Description",type:"combo",q:"Choose the evidence-based sentence, then rewrite: “The museum is successful.”",o:["The people are definitely museum experts.","The people appear to be studying the exhibits."],a:1,model:"The gallery looks crowded, which suggests that the exhibition may be popular.",f:"A photograph can show a crowded room, but it cannot prove long-term success. Use appear, look as though, suggest and may."},
{t:"Campaign Control Room",sec:"Final Transfer",type:"essay",q:"Write 70–90 words. Include a cautious opening, improve/enhance/hone, one lesson object/material word, one money expression, one transformation structure, and a clear evidence–interpretation link.",model:"At first glance, the picture appears to depict a newly modernised museum gallery. The reinforced display units may be made from MDF, which suggests that the designers wanted a practical but attractive space. The new layout enhances accessibility and could help the museum raise revenues for a children’s ward. In the unlikely event of visitor numbers falling, the museum may need to hone its fundraising strategy.",f:"Compare the structures, not individual words only. Revise your own version after reading the model."},
{t:"Your Precision Profile",sec:"Results",type:"results"}
];
let i=0, state=S.map(()=>({done:false,correct:false,attempts:0,answer:null})); let finalPts=0;
const app=document.getElementById('app'), check=document.getElementById('checkBtn'), next=document.getElementById('nextBtn'), prev=document.getElementById('prevBtn');
const norm=s=>(s||"").trim().toLowerCase().replace(/[’]/g,"'").replace(/\s+/g," ");
function sectionScore(sec){return S.reduce((n,s,j)=>n+(s.sec===sec&&state[j].done&&j<29?1:0),0)}
function total(){return state.slice(0,29).filter(x=>x.done).length+finalPts}

function esc(value){
 return String(value ?? "").replace(/[&<>"']/g,ch=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[ch]));
}
function render(){
 const s=S[i];
 document.getElementById('num').textContent=i+1;
 document.getElementById('score').textContent=total();
 document.getElementById('sectionName').textContent=s.sec;
 document.getElementById('prog').style.width=((i+1)/31*100)+"%";
 prev.disabled=i===0;
 next.disabled=!state[i].done && i<30;
 next.textContent=i===30?"Restart":"Next";
 check.style.display=(s.type==="results")?"none":"inline-block";
 check.disabled=false;

 let body=`<div class="eyebrow">${esc(s.sec)}</div><h2>${esc(s.t)}</h2>${s.q?`<p class="lead">${esc(s.q)}</p>`:""}`;
 if(s.type==="mc") body+=`<div class="options">${s.o.map((x,k)=>`<button class="option" type="button" data-k="${k}">${String.fromCharCode(65+k)}. ${esc(x)}</button>`).join("")}</div>`;
 if(s.type==="text") body+=`<input id="single" type="text" autocomplete="off" aria-label="Your answer">`;
 if(s.type==="textmulti") body+=`<div class="grid two">${s.prompts.map((prompt,k)=>`<div class="card"><label for="multi-${k}">${esc(prompt)}</label><input id="multi-${k}" class="multi" data-k="${k}" type="text" autocomplete="off"></div>`).join("")}</div>`;
 if(s.type==="selectmulti"||s.type==="match") body+=`<div class="grid">${s.prompts.map((prompt,k)=>`<div class="card"><label for="multi-${k}">${esc(prompt)}</label><select id="multi-${k}" class="multi" data-k="${k}"><option value="">Choose…</option>${s.opts.map(o=>`<option value="${esc(o)}">${esc(o)}</option>`).join("")}</select></div>`).join("")}</div>`;
 if(s.type==="sort") body+=`<div class="grid two">${s.items.map((item,k)=>`<div class="card"><label for="multi-${k}">${esc(item)}</label><select id="multi-${k}" class="multi" data-k="${k}"><option value="">Choose category…</option>${s.cats.map(o=>`<option value="${esc(o)}">${esc(o)}</option>`).join("")}</select></div>`).join("")}</div>`;
 if(s.type==="combo") body+=`<div class="options">${s.o.map((x,k)=>`<button class="option" type="button" data-k="${k}">${String.fromCharCode(65+k)}. ${esc(x)}</button>`).join("")}</div><label for="rewrite">Rewrite</label><textarea id="rewrite"></textarea>`;
 if(s.type==="essay") body+=`<textarea id="essay" placeholder="Write 70–90 words…"></textarea><p class="small">Word count: <span class="wordcount" id="wc">0</span></p><div id="essayAfter"></div>`;
 if(s.type==="results") body+=resultsHTML();
 if(s.type!=="results") body+=`<div id="fb" class="feedback"></div>`;
 app.innerHTML=body;

 bind();
 restoreAnswers();
 if(state[i].done && s.type!=="essay" && s.type!=="results"){
   markAnswers(state[i].answer);
   showFeedback(state[i].correct);
 }
 if(state[i].done && s.type==="essay") showEssayFeedback(state[i].answer);
}
function bind(){
 const s=S[i];
 document.querySelectorAll('.option').forEach(b=>b.onclick=()=>{
   document.querySelectorAll('.option').forEach(x=>x.classList.remove('selected'));
   b.classList.add('selected');
   if(s.type==="combo"){
     const current=(state[i].answer && typeof state[i].answer==="object")?state[i].answer:{choice:null,text:""};
     state[i].answer={...current,choice:+b.dataset.k};
   }else{
     state[i].answer=+b.dataset.k;
   }
 });
 const single=document.getElementById('single');
 if(single) single.oninput=()=>{state[i].answer=single.value};
 document.querySelectorAll('.multi').forEach(el=>el.onchange=el.oninput=()=>{
   state[i].answer=[...document.querySelectorAll('.multi')].map(x=>x.value);
 });
 const rewrite=document.getElementById('rewrite');
 if(rewrite) rewrite.oninput=()=>{
   const current=(state[i].answer && typeof state[i].answer==="object")?state[i].answer:{choice:null,text:""};
   state[i].answer={...current,text:rewrite.value};
 };
 const essay=document.getElementById('essay');
 if(essay) essay.oninput=()=>{
   state[i].answer=essay.value;
   document.getElementById('wc').textContent=wordCount(essay.value);
 };
}
function restoreAnswers(){
 const s=S[i], ans=state[i].answer;
 if(ans===null || ans===undefined) return;
 if(s.type==="mc" && Number.isInteger(ans)){
   const button=document.querySelector(`.option[data-k="${ans}"]`);
   if(button)button.classList.add("selected");
 }
 if(s.type==="text"){
   const el=document.getElementById('single');
   if(el)el.value=ans;
 }
 if(["textmulti","selectmulti","match","sort"].includes(s.type) && Array.isArray(ans)){
   document.querySelectorAll('.multi').forEach((el,k)=>{el.value=ans[k]??""});
 }
 if(s.type==="combo" && typeof ans==="object"){
   const button=document.querySelector(`.option[data-k="${ans.choice}"]`);
   if(button)button.classList.add("selected");
   const el=document.getElementById("rewrite");
   if(el)el.value=ans.text??"";
 }
 if(s.type==="essay"){
   const el=document.getElementById("essay");
   if(el){el.value=ans;document.getElementById("wc").textContent=wordCount(ans)}
 }
}
function getAnswers(){
 const s=S[i];
 if(s.type==="mc") return state[i].answer;
 if(s.type==="text") return document.getElementById('single').value;
 if(["textmulti","selectmulti","match","sort"].includes(s.type)) return [...document.querySelectorAll('.multi')].map(x=>x.value);
 if(s.type==="combo") return {choice:state[i].answer?.choice??null,text:document.getElementById('rewrite').value};
 if(s.type==="essay") return document.getElementById('essay').value;
}
function evaluate(ans){
 const s=S[i];
 if(s.type==="mc") return ans===s.a;
 if(s.type==="text") return s.ans.some(a=>norm(ans)===norm(a));
 if(["textmulti","selectmulti","match","sort"].includes(s.type)) return Array.isArray(ans) && s.ans.every((correct,k)=>norm(ans[k])===norm(correct));
 if(s.type==="combo") return ans.choice===s.a && /suggest|appear|look/.test(norm(ans.text)) && /may|might|popular|crowd/.test(norm(ans.text));
 return true;
}
function showFeedback(ok,msg){
 const s=S[i], fb=document.getElementById('fb');
 if(!fb)return;
 fb.className="feedback show "+(ok?"ok":"bad");
 const status=ok?"Your answer is correct.":"Your answer needs revision.";
 fb.innerHTML=`<strong>${status}</strong><br>${esc(msg||s.f)}<br><br><strong>Correct answer / model:</strong>${answerText(s)}`;
}
function markAnswers(ans){
 const s=S[i];
 if(s.type==="mc"){
   document.querySelectorAll(".option").forEach((b,k)=>{
     b.classList.remove("correct","wrong");
     if(k===s.a)b.classList.add("correct");
     else if(ans===k)b.classList.add("wrong");
   });
 }
 if(s.type==="text"){
   const el=document.getElementById("single");
   if(el){el.classList.remove("correct","wrong");el.classList.add(evaluate(ans)?"correct":"wrong")}
 }
 if(["textmulti","selectmulti","match","sort"].includes(s.type)){
   document.querySelectorAll(".multi").forEach((el,k)=>{
     el.classList.remove("correct","wrong");
     el.classList.add(norm(el.value)===norm(s.ans[k])?"correct":"wrong");
   });
 }
 if(s.type==="combo"){
   document.querySelectorAll(".option").forEach((b,k)=>{
     b.classList.remove("correct","wrong");
     if(k===s.a)b.classList.add("correct");
     else if(ans.choice===k)b.classList.add("wrong");
   });
   const el=document.getElementById("rewrite");
   if(el){el.classList.remove("correct","wrong");el.classList.add(evaluate(ans)?"correct":"wrong")}
 }
}
function answerText(s){
 if(s.type==="mc") return `<p>${esc(s.o[s.a])}</p>`;
 if(s.type==="text") return `<p>${esc(s.ans[0])}</p>`;
 if(["textmulti","selectmulti","match"].includes(s.type)){
   return `<ul class="answer-key">${s.prompts.map((prompt,k)=>`<li><strong>${esc(prompt)}</strong> → ${esc(s.ans[k])}</li>`).join("")}</ul>`;
 }
 if(s.type==="sort"){
   return `<ul class="answer-key">${s.items.map((item,k)=>`<li><strong>${esc(item)}</strong> → ${esc(s.ans[k])}</li>`).join("")}</ul>`;
 }
 if(s.type==="combo") return `<p><strong>${esc(s.o[s.a])}</strong><br>${esc(s.model)}</p>`;
 return `<p>${esc(s.model||"")}</p>`;
}
function wordCount(text){return text.trim()?text.trim().split(/\s+/).length:0}
function essayTests(ans){
 return [
  /at first glance|appears? to|looks? as though/i,
  /\b(improve|improves|improved|enhance|enhances|enhanced|hone|hones|honed)\b/i,
  /\b(reinforced|mdf|kiln|hardback|nickel)\b/i,
  /raise revenues|take a hit|in debt|splash out|haggle|paid on commission/i,
  /makes? no difference|held in high regard|come easily|have been misinformed|unlikely event of/i,
  /suggests? that|which suggests|may|might/i
 ].map(r=>r.test(ans));
}
function showEssayFeedback(ans){
 const s=S[i], passed=essayTests(ans);
 document.getElementById('essayAfter').innerHTML=`<div class="feedback show ok"><strong>Checklist score: ${passed.filter(Boolean).length}/6</strong><div class="checklist">${passed.map((yes,k)=>`<label><input type="checkbox" ${yes?"checked":""} disabled> Criterion ${k+1}</label>`).join("")}</div><p><strong>Model answer</strong><br>${esc(s.model)}</p><p>${esc(s.f)}</p></div>`;
}
check.onclick=()=>{
 const s=S[i], ans=getAnswers();
 state[i].attempts++;
 if(s.type==="essay"){
   const passed=essayTests(ans);
   finalPts=passed.filter(Boolean).length;
   state[i].done=true;
   state[i].correct=finalPts===6;
   state[i].answer=ans;
   showEssayFeedback(ans);
   next.disabled=false;
   document.getElementById('score').textContent=total();
   return;
 }
 const ok=evaluate(ans);
 state[i].correct=ok;
 state[i].done=true;
 state[i].answer=ans;
 markAnswers(ans);
 showFeedback(ok);
 next.disabled=false;
 document.getElementById('score').textContent=total();
};
function resultsHTML(){
 const secs=["Word Formation & Verb Precision","Key Word Transformations","Vocabulary Recall","Money Language","Image Description"];
 const max={"Word Formation & Verb Precision":9,"Key Word Transformations":7,"Vocabulary Recall":7,"Money Language":3,"Image Description":3};
 const vals=secs.map(x=>[x,sectionScore(x),max[x]]); const weak=[...vals].sort((a,b)=>a[1]/a[2]-b[1]/b[2])[0];
 const t=total(); let band=t>=31?["Precision Master","You retrieve and use the target language accurately in new contexts."]:t>=25?["Strong Control","Most language is active. Review exact prepositions, forms and collocations."]:t>=18?["Knowledge Is There — Retrieval Needs Work","Repeat the transformation and collocation screens."]:["Rebuild the Connections","Start with word families and fixed phrases, then return to mixed tasks."];
 state[30].done=true;
 return `<div class="card"><h3>${t}/35 — ${band[0]}</h3><p>${band[1]}</p></div>${vals.map(v=>`<div class="card"><strong>${v[0]}: ${v[1]}/${v[2]}</strong><div class="resultbar"><span style="width:${v[1]/v[2]*100}%"></span></div></div>`).join("")}<div class="card"><strong>Your priority revision area:</strong> ${weak[0]}<br><button class="primary" style="margin-top:12px" onclick="jumpWeak('${weak[0].replace(/'/g,"\\'")}')">Revisit my weakest section</button></div>`;
}
window.jumpWeak=(sec)=>{i=S.findIndex(x=>x.sec===sec);render()};
prev.onclick=()=>{if(i>0){i--;render()}}; next.onclick=()=>{if(i===30){i=0;state=S.map(()=>({done:false,correct:false,attempts:0,answer:null}));finalPts=0}else{i++}render()};
render();
</script>
